<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Amazon Music · Adaptive UI — DERBC Studio (phone build)</title>
<meta name="description" content="DERBC Studio's Amazon Music Adaptive UI prototype — a working client whose home and artist profile reshape around who you are and the moment. Shown in a phone frame so the mobile app runs true-to-size on desktop.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#050507">
<style>
  :root{ --w:402px; --accent:#25D1DA; --bg:#050507; --sbh:54px; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,"Helvetica Neue",Arial,sans-serif;
    background:radial-gradient(120% 90% at 50% -10%, #16121f 0%, #0a0a0e 42%, #050507 100%),#050507;
    color:#e7ebf0; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:26px 16px 40px;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden;
  }
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(40% 30% at 22% 16%, rgba(124,58,237,.16), transparent 70%),
               radial-gradient(36% 28% at 82% 30%, rgba(0,213,221,.12), transparent 70%); }

  /* ---- iPhone device frame, true-to-size for desktop viewing ---- */
  .iphone{ position:relative; z-index:1; width:var(--w); max-width:100%;
    height:min(862px, calc(100vh - 150px)); min-height:560px; }
  .iphone::before{ content:""; position:absolute; inset:-13px; border-radius:67px;
    background:linear-gradient(155deg,#6a6e77 0%,#2c2e35 16%,#191a1f 36%,#41444c 52%,#1b1c21 72%,#5b5f68 100%);
    box-shadow:0 42px 90px -18px rgba(0,0,0,.82),0 10px 32px -8px rgba(0,0,0,.6),inset 0 0 1px rgba(255,255,255,.25); }
  .iphone::after{ content:""; position:absolute; inset:-9px; border-radius:63px; background:#020203; }
  .ip-btn{ position:absolute; width:3.5px; border-radius:2px; background:linear-gradient(180deg,#565a63,#23252b 18%,#3a3d45 50%,#1e2026 84%,#4d515a); }
  .ip-btn--action{ left:-16px; top:186px; height:24px; }
  .ip-btn--vol1{ left:-16px; top:236px; height:46px; }
  .ip-btn--vol2{ left:-16px; top:292px; height:46px; }
  .ip-btn--power{ right:-16px; top:266px; height:72px; }

  .device{ position:relative; z-index:1; width:100%; height:100%; border-radius:54px; background:#000; overflow:hidden; }
  .device::after{ content:""; position:absolute; inset:0; z-index:80; border-radius:inherit; pointer-events:none;
    box-shadow:inset 0 0 2px rgba(255,255,255,.16), inset 0 0 14px rgba(255,255,255,.04); }

  /* status bar (clock + radios) sits over the device black, above the app frame */
  .statusbar{ position:absolute; top:0; left:0; right:0; z-index:60; height:var(--sbh);
    display:flex; align-items:center; justify-content:space-between; padding:16px 30px 8px; pointer-events:none; }
  .sb-time{ font-weight:600; font-size:16px; color:#fff; letter-spacing:.01em; font-variant-numeric:tabular-nums; }
  .sb-right{ display:flex; align-items:center; gap:7px; }
  .sb-right svg{ display:block; }
  .island{ position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:61;
    width:112px; height:31px; border-radius:20px; background:#000; pointer-events:none;
    box-shadow:inset 0 0 2px rgba(255,255,255,.08); }

  /* the live app, true-to-size, below the status bar */
  .appframe{ position:absolute; top:var(--sbh); left:0; right:0; bottom:0;
    width:100%; height:calc(100% - var(--sbh)); border:0; background:#000; display:block; }

  .hint{ position:relative; z-index:2; color:#6f7885; font-size:12px; letter-spacing:.02em; text-align:center; }
  .hint b{ color:#9aa3b0; font-weight:600; }

  /* on a real phone, drop the bezel + fake status bar and let the app fill the screen */
  @media (max-width:440px){
    body{ padding:10px 8px; gap:10px; height:100dvh; justify-content:flex-start; }
    .iphone{ width:100%; flex:1 1 auto; height:auto; min-height:0; }
    .iphone::before,.iphone::after,.ip-btn{ display:none; }
    .device{ border-radius:20px; }
    .statusbar,.island{ display:none; }
    .appframe{ top:0; height:100%; }
    .hint{ display:none; }
  }
</style>
</head>
<body>

  <div class="iphone">
    <span class="ip-btn ip-btn--action" aria-hidden="true"></span>
    <span class="ip-btn ip-btn--vol1" aria-hidden="true"></span>
    <span class="ip-btn ip-btn--vol2" aria-hidden="true"></span>
    <span class="ip-btn ip-btn--power" aria-hidden="true"></span>
    <div class="device">
      <div class="island" aria-hidden="true"></div>
      <div class="statusbar" aria-hidden="true">
        <div class="sb-time" id="clock">9:41</div>
        <div class="sb-right">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="1" fill="#fff"/><rect x="5" y="5.5" width="3" height="6.5" rx="1" fill="#fff"/><rect x="10" y="3" width="3" height="9" rx="1" fill="#fff"/><rect x="15" y="0.5" width="3" height="11.5" rx="1" fill="#fff"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7 2.8l-1.4 1.5A7.7 7.7 0 0 0 8.5 4.3 7.7 7.7 0 0 0 2.9 6.5L1.5 5C3.3 3.2 5.8 2.2 8.5 2.2Z" fill="#fff"/><path d="M8.5 5.6c1.7 0 3.3.7 4.5 1.9l-1.5 1.5a4.3 4.3 0 0 0-6 0L4 7.5A6.4 6.4 0 0 1 8.5 5.6Z" fill="#fff"/><path d="M8.5 9c.7 0 1.4.3 1.9.8L8.5 11.6 6.6 9.8A2.7 2.7 0 0 1 8.5 9Z" fill="#fff"/></svg>
          <svg width="28" height="13" viewBox="0 0 28 13" fill="none"><rect x="0.5" y="0.8" width="23" height="11.4" rx="3.2" stroke="#fff" stroke-opacity="0.4"/><rect x="2" y="2.3" width="20" height="8.4" rx="1.8" fill="#fff"/><path d="M25.5 4.3v4.4c.9-.4 1.4-1.2 1.4-2.2s-.5-1.8-1.4-2.2Z" fill="#fff" fill-opacity="0.5"/></svg>
        </div>
      </div>
      <iframe class="appframe" src="./" title="Amazon Music Adaptive UI — DERBC prototype" allow="autoplay" loading="lazy"></iframe>
    </div>
  </div>

  <p class="hint">Live and interactive — <b>tap around</b>: Home, Find, Library, Maestro, and the <b>Olivia Rodrigo artist page</b> (adaptive profile).</p>

<script>
  (function(){
    var clock = document.getElementById("clock");
    function tick(){ var d=new Date(), h=d.getHours()%12, m=d.getMinutes(); if(h===0) h=12; clock.textContent = h+":"+(m<10?"0":"")+m; }
    tick(); setInterval(tick, 15000);
  })();
</script>
</body>
</html>
